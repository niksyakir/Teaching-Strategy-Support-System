<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Generator</title>
    <!--Font for Madimi One-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Madimi+One&display=swap" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Kaushan+Script&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!--Link css stylesheet-->
    <link rel="stylesheet" type="text/css" href="../css/stylesheet.css">

    <!--PDF-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>
    
    <style>
        .footer{
                width: 100%;
                height: 70px;
                background-image: url(../pic/main\ background\ 2.png);
                background-size: cover;
            }

            .header{
                height: 66px;
            }

            .home,.current_pg,.sign,.log{
                font-size: 18px;
            }

            /*Log out*/
            .profile-container {
                position: relative;
                display: inline-block;
            }

            .profile-icon {
                width: 40px;
                height: 40px;
                cursor: pointer;
                border-radius: 50%;
                border: 2px solid #ccc;
            }

            .floating-menu {
                display: none;
                position: absolute;
                top: 50px; /* Adjust based on the icon's size */
                right: 0;
                background-color: #fff;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
                padding: 10px;
                border-radius: 5px;
                z-index: 1000;
                width: 200px;
            }

            .floating-menu p {
                margin: 0;
                padding: 5px 0;
                font-size: 14px;
                color: #333;
            }

            .logout-button {
                width: 100%;
                padding: 8px;
                background-color: #eea6a1;
                color: #fff;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
            }

            .logout-button:hover {
                background-color: #d32f2f;
            }


    </style>
</head>
<body>
    <!--Navigation bar-->
    <div class="header">
        <div class="left-side">
            <img src="../pic/logo.png" class="logo">
            <a href="indexSigned.html" class="home">HOME</a> 
            <a href="key functionSigned.html" class="home">KEY FUNCTION</a>
            <a href="aboutSigned.html" class="home">ABOUT US</a> 
            <a href="featuresSigned.html" class="current_pg">FEATURES</a> 
            <a href="contactSigned.html" class="home">CONTACT</a>
            </div>

            <div class="right-side">
                <div class="profile-container">
                    <img id="profile-icon" src="../pic/user.png" alt="Profile Icon" class="profile-icon">
                    <div id="floating-menu" class="floating-menu">
                        <p id="user-name">Liam Carter</p>
                        <p id="user-email">liamcarter@example.com</p>
                        <button id="logout-button" class="logout-button">Logout</button>
                    </div>
                </div>
            </div>

    </div>
    <div class="line"></div>
    <div class="content-otherfeatures">
        <h1>Quiz Generator</h1>  
            <div class="quiz-container">
                <div class="question-list" id="quiz-questions">
                    <div class="quiz-question">
                        <label>Question 1: </label>
                        <input type="text" id="question-1" placeholder="Enter the question">
                        <br>
                        <label>Option 1: </label><input type="text" id="option-1-1">
                        <label>Option 2: </label><input type="text" id="option-1-2">
                        <label>Option 3: </label><input type="text" id="option-1-3">
                        <label>Option 4: </label><input type="text" id="option-1-4">
                        <br>
                        <label>Correct Option: </label>
                        <select id="correct-1">
                            <option value="1">Option 1</option>
                            <option value="2">Option 2</option>
                            <option value="3">Option 3</option>
                            <option value="4">Option 4</option>
                        </select>
                    </div>
                </div>

                <button class="button" style="margin-bottom: 20px;" onclick="addNewQuestion()">Add New Question</button>

                <div class="button" style="margin-bottom: 20px;"id="preview-btn" onclick="previewQuiz()">Preview Quiz</div>

                <button class="button" style="margin-bottom: 20px;"id="download-pdf" onclick="downloadQuizPDF()">Download as PDF</button>
                <button class="button"style="margin-bottom: 20px;" id="download-csv" onclick="downloadQuizCSV()">Download as CSV</button>

                <div id="quiz-preview-container"></div>
            </div>

    </div>
    <div class="line"></div>
    <div class="footer"></div>
        

    <script src="../js/quiz.js"></script>
    <script src="../js/log_out.js"></script>
</body>
</html>
